services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oncue
      POSTGRES_PASSWORD: oncue
      POSTGRES_DB: oncue
    ports:
      - "5432:5432"
    volumes:
      - oncue_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  oncue_pg: